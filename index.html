<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toy Race</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b14;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: orange;
  color: black;
  cursor: pointer;
}

#game {
  margin-top: 30px;
}
.car {
  width: 50px;
  height: 25px;
  position: relative;
  margin: 10px;
}
</style></head><body><h1>🏁 Toy Race</h1>
<p>Sube tus carros (versión simple)</p><button onclick="startRace()">🚗 Iniciar carrera</button>

<div id="game"></div><script>
let cars = [
  {name:"Rojo", color:"red", pos:0},
  {name:"Azul", color:"blue", pos:0},
  {name:"Verde", color:"lime", pos:0}
];

function render() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  cars.forEach(c => {
    const div = document.createElement("div");
    div.className = "car";
    div.style.background = c.color;
    div.style.left = c.pos + "%";
    div.innerText = c.name;
    game.appendChild(div);
  });
}

function startRace() {
  cars.forEach(c => c.pos = 0);

  let interval = setInterval(() => {
    cars.forEach(c => {
      c.pos += Math.random() * 5;
    });

    render();

    let winner = cars.find(c => c.pos >= 90);
    if (winner) {
      clearInterval(interval);
      alert("🏆 Ganó " + winner.name);
    }
  }, 100);
}

render();
</script></body>
</html>
