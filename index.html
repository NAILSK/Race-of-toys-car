<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toy Race Real</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b14;
  color: white;
  text-align: center;
}

h1 { margin: 20px; }

input {
  margin: 10px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: orange;
  cursor: pointer;
}

#track {
  margin-top: 30px;
  position: relative;
  height: 200px;
}

.car {
  position: absolute;
  width: 80px;
  transition: left 0.1s;
}
</style></head><body><h1>🏁 Carrera con tus carros</h1><p>Sube fotos de tus carritos:</p>
<input type="file" accept="image/*" multiple id="upload"><br>
<button onclick="startRace()">Iniciar carrera</button><div id="track"></div><script>
let cars = [];

document.getElementById("upload").addEventListener("change", function(e) {
  const files = e.target.files;
  cars = [];

  for (let i = 0; i < files.length; i++) {
    const url = URL.createObjectURL(files[i]);
    cars.push({ img: url, pos: 0, top: i * 90 });
  }

  render();
});

function render() {
  const track = document.getElementById("track");
  track.innerHTML = "";

  cars.forEach(c => {
    const img = document.createElement("img");
    img.src = c.img;
    img.className = "car";
    img.style.left = c.pos + "%";
    img.style.top = c.top + "px";
    track.appendChild(img);
  });
}

function startRace() {
  let interval = setInterval(() => {
    cars.forEach(c => {
      c.pos += Math.random() * 5;
    });

    render();

    let winner = cars.find(c => c.pos >= 90);
    if (winner) {
      clearInterval(interval);
      alert("🏆 Tenemos ganador!");
    }
  }, 100);
}
</script></body>
</html>
