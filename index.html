<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toy Race Drive</title><style>
body {
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

canvas {
  background:#222;
  margin-top:10px;
  border:2px solid white;
}

button {
  margin:5px;
  padding:10px;
  font-size:16px;
}
</style></head><body><h2>🏁 Maneja tu carro real</h2><input type="file" id="upload" accept="image/*"><br><button onclick="startGame()">Iniciar</button>

<br><canvas id="game" width="300" height="500"></canvas>

<br><button onclick="moveLeft()">⬅️</button>
<button onclick="moveRight()">➡️</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let playerImg = null;
let x = 130;
let y = 400;

let enemies = [];

document.getElementById("upload").onchange = function(e){
  let file = e.target.files[0];
  playerImg = new Image();
  playerImg.src = URL.createObjectURL(file);
};

function startGame(){
  enemies = [];
  for(let i=0;i<3;i++){
    enemies.push({x:Math.random()*250,y:-i*150});
  }
  loop();
}

function loop(){
  ctx.clearRect(0,0,300,500);

  // pista
  ctx.fillStyle="gray";
  ctx.fillRect(100,0,100,500);

  // jugador
  if(playerImg){
    ctx.drawImage(playerImg,x,y,40,40);
  }

  // enemigos
  ctx.fillStyle="red";
  enemies.forEach(e=>{
    e.y += 3;
    ctx.fillRect(e.x, e.y, 40, 40);

    // colisión
    if(Math.abs(e.x - x) < 30 && Math.abs(e.y - y) < 30){
      alert("💥 Perdiste");
      location.reload();
    }

    if(e.y > 500){
      e.y = -100;
      e.x = Math.random()*250;
    }
  });

  requestAnimationFrame(loop);
}

function moveLeft(){
  x -= 20;
}

function moveRight(){
  x += 20;
}
</script></body>
</html>
